name: ci

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: build frontend
        run: |
          npm --prefix ui ci
          npm --prefix ui run build

      - name: lint frontend
        run: npm --prefix ui run lint

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: fetch push ci scripts
        run: git clone --branch v0.2.1 --depth 1 https://github.com/michaelquigley/push.git _push

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: build frontend
        run: |
          npm --prefix ui ci
          npm --prefix ui run build

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: build stamped linux-amd64
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: |
          LDFLAGS=$(_push/ci/ldflags.sh)
          go build -ldflags "${LDFLAGS}" -o pane ./cmd/pane

      - name: verify stamp
        run: |
          out=$(./pane version)
          if [ -z "${out}" ] || printf '%s\n' "${out}" | grep -F '[developer build]'; then
            printf '%s\n' "${out}"
            exit 1
          fi

      - name: package artifact
        run: tar -czf pane-linux-amd64.tar.gz pane README.md CHANGELOG.md LICENSE

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pane-linux-amd64
          path: pane-linux-amd64.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    steps:
      - name: download artifact
        uses: actions/download-artifact@v4
        with:
          name: pane-linux-amd64

      - name: name archive with ref tag
        run: mv pane-linux-amd64.tar.gz "pane-${{ github.ref_name }}-linux-amd64.tar.gz"

      - name: draft release
        uses: softprops/action-gh-release@v2
        with:
          files: pane-${{ github.ref_name }}-linux-amd64.tar.gz
          fail_on_unmatched_files: true
          draft: true
